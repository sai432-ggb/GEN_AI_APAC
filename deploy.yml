# ════════════════════════════════════════════════════════════
#  Synapse-Agent — GitHub Actions CI/CD
#  Triggers on push to main → builds Docker image → deploys to
#  Google Cloud Run (free tier, min-instances=1 for always-on)
# ════════════════════════════════════════════════════════════

name: Deploy Synapse-Agent to Cloud Run

on:
  push:
    branches: [ main ]
  workflow_dispatch:        # allow manual trigger from GitHub UI

env:
  PROJECT_ID:   ${{ secrets.GCP_PROJECT_ID }}
  SERVICE_NAME: synapse-agent
  REGION:       us-central1          # free-tier region
  IMAGE:        gcr.io/${{ secrets.GCP_PROJECT_ID }}/synapse-agent

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      # ── 1. Checkout ──
      - name: Checkout source
        uses: actions/checkout@v4

      # ── 2. Authenticate to Google Cloud ──
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # ── 3. Setup gcloud CLI ──
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      # ── 4. Configure Docker for GCR ──
      - name: Configure Docker for GCR
        run: gcloud auth configure-docker --quiet

      # ── 5. Build Docker image ──
      - name: Build Docker image
        working-directory: backend
        run: |
          docker build -t ${{ env.IMAGE }}:${{ github.sha }} -t ${{ env.IMAGE }}:latest .

      # ── 6. Push image to Google Container Registry ──
      - name: Push Docker image
        run: |
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      # ── 7. Deploy to Cloud Run ──
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.IMAGE }}:${{ github.sha }} \
            --platform managed \
            --region ${{ env.REGION }} \
            --allow-unauthenticated \
            --port 8080 \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 1 \
            --max-instances 3 \
            --concurrency 80 \
            --timeout 3600 \
            --set-env-vars "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" \
            --quiet

      # ── 8. Get and display the live URL ──
      - name: Get service URL
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --platform managed \
            --region ${{ env.REGION }} \
            --format 'value(status.url)')
          echo "🚀 Synapse-Agent is live at: $URL"
          echo "SERVICE_URL=$URL" >> $GITHUB_ENV

      # ── 9. Health check ──
      - name: Health check
        run: |
          sleep 10
          curl -f "${{ env.SERVICE_URL }}/api/health" && echo "✅ Health check passed"
